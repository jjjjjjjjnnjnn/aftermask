<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aftermask — Legacy Prototype v2</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            color: #d4d4d8;
            font-family: 'Georgia', serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #game {
            max-width: 700px;
            width: 100%;
        }
        .title {
            text-align: center;
            font-size: 2.5em;
            color: #f5f5f5;
            margin-bottom: 8px;
            letter-spacing: 4px;
        }
        .subtitle {
            text-align: center;
            font-size: 1em;
            color: #71717a;
            margin-bottom: 40px;
            font-style: italic;
        }
        .scene {
            background: #18181b;
            border: 1px solid #27272a;
            border-radius: 8px;
            padding: 32px;
            margin-bottom: 24px;
            line-height: 1.8;
        }
        .scene-header {
            color: #a1a1aa;
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            border-bottom: 1px solid #27272a;
            padding-bottom: 12px;
        }
        .scene p {
            margin-bottom: 16px;
        }
        .scene .highlight {
            color: #fbbf24;
            font-weight: bold;
        }
        .stats {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 20px 0;
            font-size: 0.9em;
        }
        .stat {
            background: #27272a;
            padding: 6px 14px;
            border-radius: 4px;
        }
        .stat-label { color: #71717a; }
        .stat-value { color: #fbbf24; font-weight: bold; }
        .era-badge {
            text-align: center;
            margin-bottom: 20px;
        }
        .era-badge span {
            background: #7c3aed20;
            color: #a78bfa;
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 0.85em;
            letter-spacing: 1px;
        }
        .choice-group {
            margin-top: 24px;
        }
        .choice-btn {
            display: block;
            width: 100%;
            background: #27272a;
            color: #d4d4d8;
            border: 1px solid #3f3f46;
            border-radius: 6px;
            padding: 14px 20px;
            margin-bottom: 10px;
            cursor: pointer;
            text-align: left;
            font-family: 'Georgia', serif;
            font-size: 0.95em;
            transition: all 0.2s;
        }
        .choice-btn:hover {
            background: #3f3f46;
            border-color: #a78bfa;
            color: #f5f5f5;
        }
        .choice-btn:active {
            background: #52525b;
        }
        .continue-btn {
            display: block;
            width: 100%;
            background: #1e1b4b;
            color: #a78bfa;
            border: 1px solid #4c1d95;
            border-radius: 6px;
            padding: 14px 20px;
            margin-top: 20px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 1em;
            text-align: center;
            transition: all 0.2s;
        }
        .continue-btn:hover {
            background: #4c1d95;
            color: #f5f5f5;
        }
        .legacy-card {
            background: #1e1b4b;
            border: 1px solid #4c1d95;
            border-radius: 6px;
            padding: 16px;
            margin: 16px 0;
        }
        .legacy-card h4 {
            color: #a78bfa;
            margin-bottom: 8px;
        }
        .death-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            opacity: 0;
            transition: opacity 1s;
        }
        .death-overlay.show { opacity: 1; }
        .death-text {
            text-align: center;
            font-size: 1.5em;
            color: #dc2626;
        }
        .final-choice {
            text-align: center;
        }
        .final-choice .yes-btn {
            background: #14532d;
            color: #4ade80;
            border: 1px solid #166534;
            font-size: 1.2em;
            padding: 16px 40px;
            margin: 10px;
        }
        .final-choice .yes-btn:hover {
            background: #166534;
            color: #f5f5f5;
        }
        .final-choice .no-btn {
            background: #450a0a;
            color: #f87171;
            border: 1px solid #7f1d1d;
            font-size: 1.2em;
            padding: 16px 40px;
            margin: 10px;
        }
        .final-choice .no-btn:hover {
            background: #7f1d1d;
            color: #f5f5f5;
        }
        .result {
            text-align: center;
            padding: 40px;
        }
        .result h2 {
            font-size: 2em;
            margin-bottom: 20px;
            color: #f5f5f5;
        }
        .tlr-yes { color: #4ade80; }
        .tlr-no { color: #f87171; }
        .result-stats {
            text-align: left;
            display: inline-block;
            margin: 20px 0;
        }
        .result-stats div {
            padding: 4px 0;
            border-bottom: 1px solid #27272a;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.5s ease; }
    </style>
</head>
<body>
    <div id="game"></div>

    <script>
    // === Game Engine ===
    const game = {
        era: 0,
        deathCount: 0,
        stats: { strength: 3, agility: 3, comprehension: 3, charisma: 3 },
        relationships: {},
        legacies: [],
        choices: [],
        events: [],
        startTime: Date.now()
    };

    const el = document.getElementById('game');

    function render(html) {
        el.innerHTML = html;
        el.classList.add('fade-in');
    }

    function stats() {
        return `<div class="stats">
            <div class="stat"><span class="stat-label">STR </span><span class="stat-value">${game.stats.strength}</span></div>
            <div class="stat"><span class="stat-label">AGI </span><span class="stat-value">${game.stats.agility}</span></div>
            <div class="stat"><span class="stat-label">INT </span><span class="stat-value">${game.stats.comprehension}</span></div>
            <div class="stat"><span class="stat-label">CHA </span><span class="stat-value">${game.stats.charisma}</span></div>
        </div>`;
    }

    function eraBadge(n) {
        return `<div class="era-badge"><span>LIFE ${n} / LEBEN ${n} / 第${n}世</span></div>`;
    }

    // === Scenes ===
    function showIntro() {
        render(`
            <div class="title">AFTERMASK</div>
            <div class="subtitle">Every life leaves a mask on the world.</div>
            <div class="scene">
                <div class="scene-header">About</div>
                <p>A reincarnation simulation. You live, you die, and the world changes because of you.</p>
                <p>Your actions create permanent, evolving consequences. What you build in Life 1 shapes Life 10.</p>
                <p><em>There are no wrong choices. Only consequences.</em></p>
            </div>
            <button class="continue-btn" onclick="showLife1()">Begin Life 1 → 开始第一世</button>
        `);
    }

    function showLife1() {
        game.era = 1;
        render(`
            ${eraBadge(1)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">The Beginning / 开始</div>
                <p>You wake up in a village called <span class="highlight">Luoxia</span>.</p>
                <p>You are 6 years old. Cold. Hungry. Alone.</p>
                <p>A woman's voice: <em>"This one's a fighter. Born during the frost."</em></p>
            </div>
            <button class="continue-btn" onclick="showEncounter()">Continue →</button>
        `);
    }

    function showEncounter() {
        render(`
            ${eraBadge(1)}
            <div class="scene">
                <div class="scene-header">The Encounter / 邂逅</div>
                <p>A man in black robes passes by. He smells of incense and steel.</p>
                <p>He drops a copper coin and looks at you with curiosity.</p>
                <p class="highlight">This is Zhang Tieshi, a wandering swordsman.</p>
            </div>
            <div class="choice-group">
                <button class="choice-btn" onclick="choose('first', 1)">1. Bow and say "Thank you, master."<br><span style="color:#71717a">鞠躬说"谢谢，师父"</span></button>
                <button class="choice-btn" onclick="choose('first', 2)">2. Pick up the coin silently.<br><span style="color:#71717a">默默捡起铜钱</span></button>
                <button class="choice-btn" onclick="choose('first', 3)">3. Push the coin back. "I don't need charity."<br><span style="color:#71717a">把铜钱推回去</span></button>
            </div>
        `);
    }

    function choose(type, value) {
        game.choices.push({ era: game.era, type, value });

        if (type === 'first') {
            if (value === 1) {
                game.stats.charisma += 1;
                game.relationships.zhang = { trust: 30, type: 'master' };
                game.events.push('adopted');
                showAfterFirst(1);
            } else if (value === 2) {
                game.stats.strength -= 1;
                game.events.push('rejected');
                showAfterFirst(2);
            } else {
                game.stats.charisma += 2;
                game.relationships.zhang = { trust: 10, type: 'acquaintance' };
                game.events.push('impressed');
                showAfterFirst(3);
            }
        } else if (type === 'secret') {
            if (value === 1) {
                game.relationships.zhang.trust = 100;
                game.relationships.zhang.status = 'dead';
                game.legacies.push({ type: 'social', desc: 'Became Sect Master after saving your master', impact: 70 });
                game.events.push('master_died');
                showAfterSecret(1);
            } else if (value === 2) {
                game.stats.comprehension += 2;
                game.events.push('witnessed_murder');
                showAfterSecret(2);
            } else {
                game.deathCount++;
                game.events.push('killed_early');
                showEarlyDeath();
                return;
            }
        } else if (type === 'legacy') {
            if (value === 1) {
                game.legacies.push({ type: 'social', desc: 'Dissolved the sect', impact: -30 });
                showDeath1();
            } else if (value === 2) {
                game.stats.charisma += 2;
                game.legacies.push({ type: 'physical', desc: 'Built a school, rebuilt the sect', impact: 80 });
                showDeath1();
            } else {
                game.stats.strength += 3;
                game.legacies.push({ type: 'social', desc: 'Destroyed the Snake Gang, lost the sect', impact: 40 });
                showDeath1();
            }
        } else if (type === 'memory') {
            if (value === 1) game.stats.strength += 2;
            else if (value === 2) game.stats.comprehension += 3;
            else game.stats.charisma += 2;
            game.events.push('memory_' + value);
            showLife2();
        } else if (type === 'intervention') {
            if (value === 1) {
                game.stats.charisma += 3;
                game.legacies.push({ type: 'physical', desc: 'Rebuilt and expanded the school', impact: 90 });
                game.events.push('rebuilt');
            } else if (value === 2) {
                game.legacies.push({ type: 'social', desc: 'Preserved the school but didn\'t expand it', impact: 50 });
                game.events.push('preserved');
            } else {
                game.stats.comprehension += 2;
                game.legacies.push({ type: 'physical', desc: 'Destroyed the school — villagers hate you', impact: -60 });
                game.events.push('destroyed');
            }
            showDeath2();
        }
    }

    function showAfterFirst(choice) {
        let text = '';
        if (choice === 1) {
            text = `<p>The swordsman pauses. <em>"Polite. That's rare."</em></p>
                    <p>He returns 3 days later. "Come with me. I'll teach you to hold a sword."</p>`;
        } else if (choice === 2) {
            text = `<p>The swordsman frowns. <em>"No manners."</em> He walks away.</p>
                    <p>A week later, older beggars beat you for trespassing on their territory.</p>`;
        } else {
            text = `<p>The swordsman raises an eyebrow. <em>"Interesting."</em></p>
                    <p>He tells the innkeeper to feed you. You eat your first full meal in weeks.</p>`;
        }
        render(`
            ${eraBadge(1)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">Aftermath / 结果</div>
                ${text}
            </div>
            <button class="continue-btn" onclick="showTraining()">4 years pass... →</button>
        `);
    }

    function showTraining() {
        game.stats.strength += 2;
        game.stats.agility += 1;
        render(`
            ${eraBadge(1)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">Training / 修炼</div>
                <p>You train under Zhang Tieshi for 4 years.</p>
                <p>You reach <span class="highlight">Martial Apprentice Level 2</span>.</p>
                <p>One night, you overhear a conversation:</p>
                <p>The Sect Master, Li Kui, wants Zhang Tieshi <span class="highlight">dead</span>.</p>
                <p>Because Zhang Tieshi knows a secret about Li Kui's past — a murder.</p>
            </div>
            <div class="choice-group">
                <button class="choice-btn" onclick="choose('secret', 1)">1. Tell Zhang Tieshi immediately.<br><span style="color:#71717a">立刻告诉张铁匠</span></button>
                <button class="choice-btn" onclick="choose('secret', 2)">2. Stay silent and wait.<br><span style="color:#71717a">保持沉默，等待</span></button>
                <button class="choice-btn" onclick="choose('secret', 3)">3. Confront Li Kui directly.<br><span style="color:#71717a">直接对质李奎</span></button>
            </div>
        `);
    }

    function showAfterSecret(choice) {
        let text = '';
        if (choice === 1) {
            text = `<p>Zhang Tieshi fights Li Kui. Wins, but is fatally wounded.</p>
                    <p>His last words: <em>"Wu Ming... the sect is yours now."</em></p>
                    <p>You are 20 years old. You are the new Sect Master.</p>`;
        } else {
            text = `<p>Li Kui kills Zhang Tieshi while you watch.</p>
                    <p>You do nothing. The guilt is overwhelming.</p>`;
        }
        render(`
            ${eraBadge(1)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">The Confrontation / 对峙</div>
                ${text}
            </div>
            <button class="continue-btn" onclick="showLegacyDecision()">5 years pass... →</button>
        `);
    }

    function showLegacyDecision() {
        render(`
            ${eraBadge(1)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">Legacy Decision / 遗产抉择</div>
                <p>5 years as Sect Master. The sect grows to 60 disciples.</p>
                <p>Then — a plague. Your best disciple, <span class="highlight">Chen Yu</span>, dies.</p>
                <p>You bury him next to Zhang Tieshi's grave.</p>
            </div>
            <div class="choice-group">
                <button class="choice-btn" onclick="choose('legacy', 1)">1. Close the sect. "I can't bear to lose anyone else."<br><span style="color:#71717a">关闭门派</span></button>
                <button class="choice-btn" onclick="choose('legacy', 2)">2. Rebuild stronger. "Chen Yu would want me to continue."<br><span style="color:#71717a">更强地重建</span></button>
                <button class="choice-btn" onclick="choose('legacy', 3)">3. Seek revenge on the Poison Snake Gang.<br><span style="color:#71717a">向毒蛇帮复仇</span></button>
            </div>
        `);
    }

    function showEarlyDeath() {
        render(`
            ${eraBadge(1)}
            <div class="scene">
                <div class="scene-header">Death / 死亡</div>
                <p>You are 12 years old.</p>
                <p>Li Kui kills you on the spot for confronting him.</p>
                <p>You die before you can change anything.</p>
            </div>
            <div class="continue-btn" onclick="showReincarnation()">Continue to reincarnation... →</button>
        `);
    }

    function showDeath1() {
        game.deathCount++;
        render(`
            ${eraBadge(1)}
            <div class="scene">
                <div class="scene-header">Death / 死亡</div>
                <p>You are 30 years old. Wounded. Bleeding.</p>
                <p>You collapse in the snow outside Luoxia Village.</p>
                <p>An old woman finds you: <em>"You look like someone I knew..."</em></p>
                <p>You try to speak. Blood comes out instead.</p>
                <p class="highlight">You die at age 30.</p>
            </div>
            <button class="continue-btn" onclick="showReincarnation()">Continue to reincarnation... →</button>
        `);
    }

    function showReincarnation() {
        render(`
            <div class="scene" style="text-align:center">
                <div class="scene-header">Reincarnation / 转生</div>
                <p>You float in darkness.</p>
                <p>A voice speaks:</p>
                <p><em>"Your life has ended. But your story is not over."</em></p>
                <p><em>"Choose which memory to carry into your next life."</em></p>
            </div>
            <div class="legacy-card">
                <h4>Your Legacies from Life 1:</h4>
                ${game.legacies.map(l => `<p style="margin:4px 0">• ${l.desc} (Impact: ${l.impact})</p>`).join('')}
            </div>
            <div class="choice-group">
                <button class="choice-btn" onclick="choose('memory', 1)">1. Zhang Tieshi's smile: "I'm proud of you."<br><span style="color:#71717a">+2 STR, +20 Loyalty</span></button>
                <button class="choice-btn" onclick="choose('memory', 2)">2. The fall of the sect: fire, screams, death.<br><span style="color:#71717a">+3 INT, +30 Caution</span></button>
                <button class="choice-btn" onclick="choose('memory', 3)">3. The school you built: children learning, laughing.<br><span style="color:#71717a">+2 CHA, Legacy +20</span></button>
            </div>
        `);
    }

    function showLife2() {
        game.era = 2;
        render(`
            ${eraBadge(2)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">Reborn / 重生</div>
                <p>You are born again.</p>
                <p>This time, in a different village. Your father is a blacksmith.</p>
                <p>You are named <span class="highlight">Li Feng</span>.</p>
            </div>
            <button class="continue-btn" onclick="showDiscovery()">10 years pass... →</button>
        `);
    }

    function showDiscovery() {
        game.stats.strength += 1;
        const legacy = game.legacies[0];
        render(`
            ${eraBadge(2)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">The Discovery / 发现</div>
                <p>At age 10, you feel drawn to a place you've never been.</p>
                <p>A village called <span class="highlight">Luoxia</span>.</p>
                <p>You walk there. Three days on foot.</p>
            </div>
            <button class="continue-btn" onclick="showLegacyReveal()">Arrive at Luoxia →</button>
        `);
    }

    function showLegacyReveal() {
        const impact = game.legacies[0]?.impact || 0;
        render(`
            ${eraBadge(2)}
            ${stats()}
            <div class="scene">
                <div class="scene-header">The Legacy / 遗产</div>
                ${impact >= 70 ? `
                    <p>You see a building. Old. Weathered. But still standing.</p>
                    <p>A teacher comes out: <em>"Welcome, young one."</em></p>
                    <p>Above the door, a plaque:</p>
                    <p class="highlight">「无名学堂 — Lin Wuming 创立」</p>
                    <p>Your heart stops. <em>Lin Wuming.</em> That was your name in your previous life.</p>
                ` : impact > 0 ? `
                    <p>You find a building. It exists, but it's not what it used to be.</p>
                    <p>It needs help. It needs someone who cares.</p>
                ` : `
                    <p>You find nothing. The village is just a village.</p>
                    <p>No legacy. No trace of who you were.</p>
                `}
            </div>
            <div class="choice-group">
                <button class="choice-btn" onclick="choose('intervention', 1)">1. Rebuild it. Make it better than before.<br><span style="color:#71717a">重建，比以前更好</span></button>
                <button class="choice-btn" onclick="choose('intervention', 2)">2. Leave it as it is.<br><span style="color:#71717a">保持原样</span></button>
                <button class="choice-btn" onclick="choose('intervention', 3)">3. Destroy it. Start fresh.<br><span style="color:#71717a">毁掉它，重新开始</span></button>
            </div>
        `);
    }

    function showDeath2() {
        game.deathCount++;
        const intervention = game.choices.find(c => c.type === 'intervention')?.value;
        render(`
            ${eraBadge(2)}
            <div class="scene">
                <div class="scene-header">Death / 死亡</div>
                <p>You are 30 years old.</p>
                ${intervention === 1 ? `
                    <p>You die peacefully, surrounded by your students.</p>
                    <p>Your last thought: <em>"I rebuilt what I created. The circle is complete."</em></p>
                ` : intervention === 2 ? `
                    <p>You die quietly. The school survives, but doesn't grow.</p>
                    <p>Your last thought: <em>"Some things are better left unchanged."</em></p>
                ` : `
                    <p>You die alone. The villagers despise you for destroying their history.</p>
                    <p>Your last thought: <em>"Was it worth it?"</em></p>
                `}
            </div>
            <button class="continue-btn" onclick="showFinalChoice()">Continue to reincarnation... →</button>
        `);
    }

    function showFinalChoice() {
        render(`
            <div class="scene" style="text-align:center">
                <div class="scene-header">The World Has Changed / 世界已经改变</div>
                <p>You float in darkness again.</p>
                <p>A voice speaks:</p>
                <p><em>"Your legacy has evolved."</em></p>
            </div>
            <div class="legacy-card">
                <h4>What Your Actions Created:</h4>
                ${game.legacies.map(l => `<p style="margin:4px 0">• ${l.desc} (Impact: ${l.impact})</p>`).join('')}
            </div>
            <div class="scene final-choice">
                <div class="scene-header">The Final Question / 最后的问题</div>
                <p>The world is different because of you.</p>
                <p>Some things are better. Some are worse.</p>
                <p>But the world has changed.</p>
                <br>
                <p class="highlight">Do you want to live another life?</p>
                <p><em>This is the real test. There is no wrong answer.</em></p>
                <br>
                <button class="choice-btn yes-btn" onclick="showResult(true)">YES — Continue to Life 3<br>是 — 继续第三世</button>
                <button class="choice-btn no-btn" onclick="showResult(false)">NO — Stop here<br>否 — 到此为止</button>
            </div>
        `);
    }

    function showResult(tlr) {
        const timePlayed = Math.round((Date.now() - game.startTime) / 1000);
        const results = {
            timestamp: new Date().toISOString(),
            era: game.era,
            deathCount: game.deathCount,
            choices: game.choices,
            legacies: game.legacies,
            events: game.events,
            stats: game.stats,
            tlr_answer: tlr,
            timePlayed: timePlayed
        };

        // Save to console for testing
        console.log('=== AFTERMASK TEST RESULT ===');
        console.log(JSON.stringify(results, null, 2));

        // Also save to clipboard if possible
        const resultStr = JSON.stringify(results, null, 2);

        render(`
            <div class="scene result">
                <div class="scene-header">Test Complete / 测试完成</div>
                <h2>Aftermask</h2>
                <p>Thank you for playing.</p>
                <br>
                <div class="result-stats">
                    <div><span class="stat-label">Lives lived: </span><span class="stat-value">${game.era}</span></div>
                    <div><span class="stat-label">Deaths: </span><span class="stat-value">${game.deathCount}</span></div>
                    <div><span class="stat-label">Choices made: </span><span class="stat-value">${game.choices.length}</span></div>
                    <div><span class="stat-label">Legacies created: </span><span class="stat-value">${game.legacies.length}</span></div>
                    <div><span class="stat-label">Time played: </span><span class="stat-value">${timePlayed}s</span></div>
                    <div><span class="stat-label">TLR: </span><span class="stat-value ${tlr ? 'tlr-yes' : 'tlr-no'}">${tlr ? 'YES' : 'NO'}</span></div>
                </div>
                <br>
                <p style="color:#71717a; font-size:0.85em">Results have been saved to the browser console (F12).</p>
                <p style="color:#71717a; font-size:0.85em">Please screenshot this page and share it.</p>
                <br>
                <button class="continue-btn" onclick="location.reload()">Play Again / 再玩一次</button>
            </div>
        `);
    }

    // === Start ===
    showIntro();
    </script>
</body>
</html>
